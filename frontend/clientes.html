<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - GymManager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h1>🏋️ GymManager</h1>
        <a href="index.html">Inicio</a>
        <a href="clientes.html">Clientes</a>
        <a href="membresias.html">Membresías</a>
        <a href="reportes.html">Reportes</a>
        <a href="evaluaciones.html">Evaluaciones</a>
    </nav>
    <div class="container">
        <h2>Gestión de Clientes</h2>

        <div id="mensaje" class="mensaje"></div>

        <div class="form-card">
            <h3 id="form-titulo">Nuevo Cliente</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" placeholder="Apellido">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono" placeholder="3001234567">
                </div>
                <div class="form-group">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>
                <button class="btn btn-secondary" onclick="limpiarFormulario()">Cancelar</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Fecha Nacimiento</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-clientes"></tbody>
            </table>
        </div>
    </div>
    <script src="js/clientes.js"></script>
</body>
</html>
